name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Install and build the Next.js app
      - name: Install root dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      # Install and build the Electron wrapper
      - name: Install Electron dependencies
        working-directory: macos
        run: npm ci

      - name: Build Electron TypeScript
        working-directory: macos
        run: npx tsc -p tsconfig.json

      # Package with Electron Forge
      - name: Package app
        working-directory: macos
        run: npx electron-forge make --arch=${{ matrix.arch }}
        env:
          # Skip code signing in CI
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      # Upload artifacts
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: MarkScout-macOS-${{ matrix.arch }}-dmg
          path: macos/out/make/**/*.dmg
          if-no-files-found: ignore

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: MarkScout-macOS-${{ matrix.arch }}-zip
          path: macos/out/make/**/*.zip
          if-no-files-found: ignore

  release:
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
