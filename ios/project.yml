name: MarkScout
options:
  bundleIdPrefix: com.markscout
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: NF42YB3AHP
    CODE_SIGN_STYLE: Automatic

targets:
  MarkScout:
    type: application
    platform: iOS
    sources:
      - path: MarkScout
        excludes:
          - "Resources/**"
          - "Assets.xcassets"
      - path: MarkScout/Resources/reader.html
        buildPhase: resources
      - path: MarkScout/Resources/reader.css
        buildPhase: resources
      - path: MarkScout/Resources/marked.min.js
        buildPhase: resources
      - path: MarkScout/Resources/highlight.min.js
        buildPhase: resources
      - path: MarkScout/Resources/github-dark.min.css
        buildPhase: resources
      - path: MarkScout/Resources/JetBrainsMono-Regular.woff2
        buildPhase: resources
      - path: MarkScout/Resources/SourceSerif4-Regular.woff2
        buildPhase: resources
      - path: MarkScout/Resources/SampleData
        buildPhase: resources
        type: folder
      - path: MarkScout/Assets.xcassets
    info:
      path: MarkScout/Info.plist
      properties:
        UIUserInterfaceStyle: Dark
        NSUserActivityTypes:
          - com.markscout.viewing
        CFBundleDisplayName: MarkScout
        LSApplicationCategoryType: public.app-category.productivity
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        PRODUCT_BUNDLE_IDENTIFIER: com.markscout.ios
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
